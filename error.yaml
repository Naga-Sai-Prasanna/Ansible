- name: error handling 
  hosts: local
  connection: local
  tasks: 
  - name: check user exists or not
    ansible.builtin.command: id roboshop
    register: users_output
    ignore_errors: true

  - name: print the output  
    ansible.builtin.debug: 
       msg: "{{ users_output }}" 

  - name: create user
    ansible.bultin.command: useradd roboshop 
    when: users_output.rc !=0  