- name: check a number less than 10 or not
  hosts: local
  connection: local
  vars_prompt:
  - name: NUMBER_OF_SESSIONS
    prompt: please enter number
    private: false
  tasks:
  - name: is ansible is more than 5 sessions
    ansible.builtin.debug:
       msg: "yes more than 5"
    when: NUMBER_OF_SESSIONS > 20
